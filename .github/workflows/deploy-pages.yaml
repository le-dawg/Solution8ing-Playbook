name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps is required due to React peer dependency conflicts
        # between Docusaurus v2 and the search plugin (documented in repo instructions)
        run: npm install --legacy-peer-deps

      - name: Build Docusaurus site
        env:
          # Set the URL and base URL to match the repository owner's GitHub Pages
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_URL: /${{ github.event.repository.name }}/
        run: |
          # Create a temporary config file that overrides the URL and baseUrl
          cat > docusaurus.config.override.js << 'EOF'
          const baseConfig = require('./docusaurus.config.js');
          module.exports = {
            ...baseConfig,
            url: process.env.SITE_URL || baseConfig.url,
            baseUrl: process.env.BASE_URL || baseConfig.baseUrl,
          };
          EOF
          npm run build -- --config docusaurus.config.override.js --out-dir ./build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
